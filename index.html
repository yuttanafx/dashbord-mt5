<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terravolteco | Trading Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="glass p-6 rounded-2xl mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Trading <span class="text-blue-500">Terminal</span></h1>
                <p class="text-slate-400 text-sm">System Status: <span id="connStatus" class="text-yellow-500">Checking...</span></p>
            </div>
            <div>
                <label class="text-xs text-slate-400 block mb-1">Lot Size</label>
                <input type="number" id="globalLot" value="0.01" step="0.01" class="bg-slate-900 border border-slate-700 rounded px-3 py-2 w-24 text-center">
            </div>
        </header>

        <!-- Pairs Grid -->
        <div id="pairsGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>

        <!-- History -->
        <section class="glass rounded-2xl p-6">
            <h2 class="font-bold mb-4">Order History</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-slate-400 border-b border-slate-700">
                        <tr><th class="py-2">Time</th><th>Symbol</th><th>Side</th><th>Volume</th><th>Result</th></tr>
                    </thead>
                    <tbody id="historyLog"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const pairs = ['XAUUSD', 'EURUSD', 'GBPUSD', 'USDJPY', 'AUDUSD', 'USDCAD', 'NZDUSD', 'USDCHF', 'BTCUSD', 'ETHUSD'];
        
        // 1. สร้างปุ่มคู่เงิน
        const grid = document.getElementById('pairsGrid');
        pairs.forEach(p => {
            grid.innerHTML += `
                <div class="glass p-4 rounded-xl text-center">
                    <h3 class="font-bold mb-2">${p}</h3>
                    <div class="flex gap-2">
                        <button onclick="trade('${p}', 'BUY')" class="flex-1 bg-green-600 py-2 rounded font-bold text-xs">BUY</button>
                        <button onclick="trade('${p}', 'SELL')" class="flex-1 bg-red-600 py-2 rounded font-bold text-xs">SELL</button>
                    </div>
                </div>`;
        });

        // 2. ฟังก์ชันส่งคำสั่งไปหา Python Bridge
        async function trade(symbol, action) {
            const lot = document.getElementById('globalLot').value;
            const log = document.getElementById('historyLog');
            const time = new Date().toLocaleTimeString();

            try {
                // เช็คสถานะการเชื่อมต่อ
           fetch('http://localhost:8000/trade', {method: 'OPTIONS'})
            .then(() => document.getElementById('connStatus').innerText = 'Connected')
            .catch(() => document.getElementById('connStatus').innerText = 'Disconnected'); })
                });

                const data = await res.json();
                const color = action === 'BUY' ? 'text-green-500' : 'text-red-500';
                
                log.innerHTML = `
                    <tr class="border-b border-slate-800">
                        <td class="py-3">${time}</td>
                        <td class="font-bold">${symbol}</td>
                        <td class="${color} font-bold">${action}</td>
                        <td>${lot}</td>
                        <td class="text-blue-400">Success ID:${data.order_id || 'N/A'}</td>
                    </tr>` + log.innerHTML;
            } catch (e) {
                alert("เชื่อมต่อ Python Bridge (localhost:8000) ไม่ได้! ตรวจสอบว่ารัน bridge.py อยู่");
            }
        }

        // เช็คสถานะการเชื่อมต่อ
        fetch('http://localhost:8000/trade', {method: 'OPTIONS'})
            .then(() => document.getElementById('connStatus').innerText = 'Connected')
            .catch(() => document.getElementById('connStatus').innerText = 'Disconnected');
    </script>
</body>
</html>
