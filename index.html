<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Trading Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Trading Terminal <span id="connStatus" class="text-red-500 text-sm">(Disconnected)</span></h1>
        <input type="number" id="globalLot" value="0.01" step="0.01" class="text-black p-2 rounded mb-4">
        
        <div id="pairsGrid" class="grid grid-cols-3 gap-4 mb-8"></div>

        <table class="w-full text-left">
            <thead><tr class="text-slate-400"><th>Time</th><th>Symbol</th><th>Side</th><th>Result</th></tr></thead>
            <tbody id="historyLog"></tbody>
        </table>
    </div>

    <script>
        const pairs = ['XAUUSD', 'EURUSD', 'GBPUSD'];
        const grid = document.getElementById('pairsGrid');
        
        pairs.forEach(p => {
            grid.innerHTML += `<div class="bg-slate-800 p-4 rounded">
                <h3 class="font-bold mb-2">${p}</h3>
                <button onclick="trade('${p}', 'BUY')" class="bg-green-600 px-4 py-1 rounded">BUY</button>
                <button onclick="trade('${p}', 'SELL')" class="bg-red-600 px-4 py-1 rounded">SELL</button>
            </div>`;
        });

        async function trade(symbol, action) {
            const lot = document.getElementById('globalLot').value;
            try {
                const res = await fetch('http://localhost:8000/trade', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ symbol, action, volume: parseFloat(lot) })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('historyLog').innerHTML += `<tr><td>${new Date().toLocaleTimeString()}</td><td>${symbol}</td><td>${action}</td><td class="text-green-500">Success</td></tr>`;
                    document.getElementById('connStatus').innerText = '(Connected)';
                    document.getElementById('connStatus').className = 'text-green-500 text-sm';
                } else {
                    alert("Error: " + data.detail);
                }
            } catch (e) {
                alert("เชื่อมต่อไม่ได้! ตรวจสอบว่ารัน bridge.py แล้ว");
            }
        }
    </script>
</body>
</html>
